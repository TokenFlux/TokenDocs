- generic [ref=e2]: "# 快速开始 本页用于完成 TokenFlux 的首次接入，默认推荐通过 `CC-Switch` 接入 `Claude Code` 或 `Codex`。 ::: details 面向 Agent / AI 抓取 批量读取文档时，可直接使用 [sitemap.xml](http://localhost:5173/sitemap.xml)。单页读取时，可在正文顶部使用“复制 Markdown”。 ::: ## 开始前确认 1. 按 [创建 API Key](http://localhost:5173/docs/tokenflux/create-apikey.md) 生成一个新的 API Key。 2. 按 [计费说明](http://localhost:5173/docs/tokenflux/billing.md) 了解购买方式，并前往 [充值/订阅页面](https://tokenflux.dev/purchase) 完成充值或订阅。模型广场显示的价格即为最终计费价格。 ## 推荐：通过 CC-Switch 接入 Claude Code 或 Codex 1. 按 [CC-Switch](http://localhost:5173/docs/agents/cc-switch.md) 完成安装。 2. 根据使用的客户端继续完成接入。 Claude Code： [Claude Code 使用指南](http://localhost:5173/docs/agents/claude-code.md) Codex： [Codex 使用指南](http://localhost:5173/docs/agents/codex.md) 3. 完成配置后，重启客户端并开始使用。 ## 不使用 CC-Switch 时 如需手动配置，可直接查看以下页面中的对应说明： - [Claude Code 使用指南](http://localhost:5173/docs/agents/claude-code.md) - [Codex 使用指南](http://localhost:5173/docs/agents/codex.md) ## 更多客户端 - [OpenCode 使用指南](http://localhost:5173/docs/agents/opencode.md) ## 继续阅读 - [计费说明](http://localhost:5173/docs/tokenflux/billing.md) - [邀请返利](http://localhost:5173/docs/tokenflux/referral.md)"